<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameFinder // Poland Sector</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --gold: #d8c3a5; 
            --dark: #0c0d12; 
            --accent: #e94560; 
            --glass: rgba(22, 33, 62, 0.98); 
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--dark); 
            color: var(--gold); 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER (Mobilny RWD) --- */
        header { 
            background: #1a1a2e; 
            padding: 10px 15px; 
            border-bottom: 2px solid #8c6a30; 
            z-index: 2000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Pozwala zawijać na bardzo małych ekranach */
            gap: 10px;
        }

        header h1 { 
            margin: 0; 
            font-size: 1.2rem; 
            letter-spacing: 1px; 
            flex-shrink: 1;
        }

        .btn-add-main {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        /* --- MAIN CONTENT & MAPA --- */
        .main-content { 
            flex: 1; 
            position: relative; 
            overflow: hidden;
        }
        #map { 
            width: 100%;
            height: 100%;
            background: #000; 
        }

        /* --- SIDEBAR (Kluczowe zmiany RWD) --- */
        #sidebar { 
            background: var(--glass); 
            border-left: 2px solid #8c6a30; 
            padding: 20px; 
            display: none; 
            position: absolute;
            z-index: 3000;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease-out;
        }

        /* Styl dla Komputerów (Desktop) */
        @media (min-width: 768px) {
            #sidebar {
                width: 380px; 
                right: 0; top: 0; bottom: 0;
                border-left: 2px solid #8c6a30;
                border-top: none;
            }
        }

        /* Styl dla Telefonów (Mobile) - Wysuwany z dołu */
        @media (max-width: 767px) {
            #sidebar {
                width: 100%;
                height: 80%; /* Zajmuje 80% wysokości ekranu */
                bottom: 0; left: 0; right: 0;
                border-left: none;
                border-top: 3px solid #8c6a30;
                border-radius: 15px 15px 0 0;
                box-sizing: border-box;
                padding: 15px;
            }
            
            /* Przycisk zamykania na mobile jest ważniejszy */
            .shop-card h2 { font-size: 1.5rem; }
        }

        /* --- FORMULARZ & KARTY (Dostosowanie do palca) --- */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; color: #8c6a30; font-weight: bold; }
        input { 
            width: 100%; padding: 12px; background: #0c0d12; border: 1px solid #333; 
            color: white; border-radius: 4px; box-sizing: border-box; font-size: 1rem; /* Większy font, żeby iOS nie robił zoomu */
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn-save { 
            background: var(--accent); color: white; border: none; padding: 15px; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 10px;
            font-size: 1rem;
        }

        .shop-card h2 { color: var(--accent); margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .shop-card label { margin-top: 15px; color: var(--gold); opacity: 0.8; }
        .shop-card p { margin: 5px 0; font-size: 1rem; line-height: 1.4; color: #fff; }
        
        #loading_msg { display: none; color: var(--accent); font-weight: bold; text-align: center; margin: 10px 0; font-size: 0.8rem; }
        .req-star { color: var(--accent); }

        /* Poprawka dla kontrolek mapy na mobile */
        .leaflet-touch .leaflet-bar a { width: 35px; height: 35px; line-height: 35px; }
    </style>
</head>
<body>

    <header>
        <h1>GAMEFINDER // POLAND</h1>
        <button class="btn-add-main" onclick="toggleAddForm()">+ Dodaj Sklep</button>
    </header>

    <div class="main-content">
        <div id="map"></div>
        <div id="sidebar">
            <div id="sidebarContent"></div>
        </div>
    </div>

<script>
window.onload = function() {
    // --- DANE SUPABASE (Zawsze Twoje) ---
    const SUPABASE_URL = 'https://mzxtgapfqwhhnnldxwlx.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHRnYXBmcXdoaG5ubGR4d2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzA3MDEsImV4cCI6MjA5MDMwNjcwMX0.Mc1aD03KQULGkUjc-folTiv9DVUY6fFl0Ke9A2EHFxw';

    const { createClient } = window.supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- MAPA (Zoptymalizowana pod Mobile) ---
    const map = L.map('map', { 
        zoomSnap: 0.1, 
        attributionControl: false,
        zoomControl: false // Wyłączamy domyślny, dodamy w lepszym miejscu
    }).setView([52.06, 19.48], 6);

    // Dodajemy zoom control w prawym dolnym rogu (wygodniej na mobile)
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Maska Polski
    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
    .then(res => res.json()).then(data => {
        const poland = data.features.find(f => f.properties.name === "Poland");
        if (poland) {
            L.geoJSON(poland, { 
                style: { color: "#8c6a30", weight: 1.5, fillOpacity: 0.03, fillColor: "#8c6a30" }, 
                interactive: false 
            }).addTo(map);
        }
    });

    // Pomocnik do dużych liter
    const formatText = (str) => {
        if (!str) return "";
        return str.trim().toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    };

    // --- UNIWERSALNE OTWIERANIE SIDEBARU ---
    function openSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.style.display = 'block';
        // Na mobile przewijamy na górę panelu
        if(window.innerWidth < 768) {
            sidebar.scrollTop = 0;
        }
    }

    // --- FORMULARZ DODAWANIA ---
    window.toggleAddForm = function() {
        const content = document.getElementById('sidebarContent');
        openSidebar();
        
        content.innerHTML = `
            <h2 style="color:var(--accent);">Nowy Sektor</h2>
            <div class="form-group">
                <label>Nazwa Sklepu <span class="req-star">*</span></label>
                <input type="text" id="add_name" placeholder="np. Retro Gry">
            </div>
            <div class="form-group">
                <label>Ulica i numer <span class="req-star">*</span></label>
                <input type="text" id="add_street" placeholder="np. Marszałkowska 10">
            </div>
            <div class="form-group">
                <label>Miasto <span class="req-star">*</span></label>
                <input type="text" id="add_city" placeholder="np. Warszawa">
            </div>
            <div class="form-group">
                <label>Strona WWW (opcjonalnie)</label>
                <input type="text" id="add_url" placeholder="www.strona.pl">
            </div>

            <div id="loading_msg">ZAMIANA ADRESU NA WSPÓŁRZĘDNE...</div>

            <button class="btn-save" id="btn_submit" onclick="finalizujZapisAutomatyczny()">ZAPISZ SKLEP</button>
            <button class="btn-save" style="background:none; border:1px solid #444; margin-top:8px;" onclick="document.getElementById('sidebar').style.display='none'">ANULUJ</button>
            <div style="height: 20px;"></div> `;
    }

    // --- ZAPIS (Geokodowanie) ---
    window.finalizujZapisAutomatyczny = async function() {
        const rawName = document.getElementById('add_name').value;
        const rawStreet = document.getElementById('add_street').value;
        const rawCity = document.getElementById('add_city').value;
        const web = document.getElementById('add_url').value.trim().toLowerCase();
        
        const name = formatText(rawName);
        const street = formatText(rawStreet);
        const city = formatText(rawCity);

        const loader = document.getElementById('loading_msg');
        const btn = document.getElementById('btn_submit');

        if(!name || !street || !city) {
            alert("Uzupełnij nazwę, ulicę i miasto!");
            return;
        }

        const fullAddress = `${street}, ${city}`;
        loader.style.display = "block";
        btn.disabled = true;
        btn.style.opacity = "0.5";

        try {
            const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fullAddress)}`;
            const response = await fetch(geoUrl);
            const geoData = await response.json();

            if (geoData.length === 0) {
                alert("Nie znaleźliśmy takiego adresu. Sprawdź pisownię!");
                return;
            }

            const { error } = await _supabase.from('shops').insert([
                { name: name, city: fullAddress, lat: geoData[0].lat, lng: geoData[0].lon, description: web }
            ]);

            if (!error) {
                alert("Sektor " + name + " dodany!");
                location.reload();
            } else {
                alert("Błąd bazy: " + error.message);
            }
        } catch (err) {
            alert("Problem z serwerem map.");
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
            btn.style.opacity = "1";
        }
    }

    // --- WCZYTYWANIE PUNKTÓW ---
    async function loadShops() {
        const { data: shops, error } = await _supabase.from('shops').select('*');
        if (error) return;

        shops.forEach(shop => {
            const marker = L.circleMarker([shop.lat, shop.lng], {
                radius: 8, // Troszkę większe, by łatwiej kliknąć palcem
                fillColor: "#e94560", color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.9
            }).addTo(map);

            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                showShopInfo(shop);
            });
        });
    }

    // --- PODGLĄD SKLEPU ---
    window.showShopInfo = function(shop) {
        const content = document.getElementById('sidebarContent');
        openSidebar();
        
        let displayLink = shop.description || "";
        let fullLink = displayLink;
        if (fullLink && !fullLink.startsWith('http')) fullLink = 'https://' + fullLink;

        content.innerHTML = `
            <div class="shop-card">
                <h2>${shop.name}</h2>
                <label>ADRES SEKTORA:</label>
                <p>${shop.city}</p>
                
                <label>STRONA WWW / KONTAKT:</label>
                ${displayLink ? `
                    <p style="margin-top: 15px; margin-bottom: 15px;">
                        <a href="${fullLink}" target="_blank" style="color: #fff; background: var(--accent); font-weight: bold; text-decoration: none; padding: 12px 20px; border-radius: 4px; display: inline-block;">➔ ODWIEDŹ STRONĘ</a>
                    </p>
                    <p style="font-size: 0.8rem; color: #8c6a30; word-break: break-all; opacity: 0.8;">${displayLink}</p>
                ` : '<p style="color: #666;">Brak danych</p>'}
                
                <hr style="border:0; border-top:1px solid #333; margin: 30px 0;">
                <button class="btn-save" style="background:#222;" onclick="document.getElementById('sidebar').style.display='none'">POWRÓT DO MAPY</button>
                <div style="height: 20px;"></div> </div>
        `;
    }

    // Kliknięcie w mapę zamyka sidebar na mobile
    map.on('click', () => {
        if(window.innerWidth < 768) {
            document.getElementById('sidebar').style.display = 'none';
        }
    });

    loadShops();
};
</script>
</body>
</html>
