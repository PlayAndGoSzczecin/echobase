<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIEĆ REBELII // HQ</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --gold: #d8c3a5; 
            --dark-red: #1a0a0a; 
            --accent: #e94560; 
            --glass: rgba(26, 10, 10, 0.98);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #000; 
            color: var(--gold); 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header { 
            background: #1a0a0a; 
            padding: 10px 20px; 
            border-bottom: 2px solid #8c6a30; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
        }

        header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }

        .btn-add-main {
            background: transparent;
            color: var(--gold);
            border: 1px solid #8c6a30;
            padding: 8px 15px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.7rem;
        }

        /* --- MAPA --- */
        #map { flex: 1; background: #000; }

        /* --- SIDEBAR --- */
        #sidebar { 
            width: 380px; 
            background: var(--glass); 
            border-left: 3px solid #8c6a30; 
            padding: 25px; 
            display: none; 
            position: absolute;
            right: 0; top: 0; bottom: 0;
            z-index: 3000;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }

        @media (max-width: 767px) {
            #sidebar { width: 100%; height: 80%; bottom: 0; top: auto; border-left: none; border-top: 4px solid #8c6a30; border-radius: 20px 20px 0 0; }
        }

        /* --- STYL KARTY --- */
        .shop-card h2 { color: #ffcc00; border-bottom: 2px solid #333; padding-bottom: 10px; text-transform: uppercase; margin-top: 0; }
        .info-row { margin-bottom: 20px; border-left: 2px solid var(--accent); padding-left: 15px; }
        .info-row label { display: block; font-size: 0.7rem; color: #8c6a30; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .info-row p { margin: 0; font-size: 1.1rem; color: #fff; }

        .btn-save { 
            background: var(--accent); color: white; border: none; padding: 15px; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 10px;
        }

        /* --- PULSUJĄCY PUNKT (ZAMIAST PLIKU PAD.PNG) --- */
        .rebel-marker {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            animation: pulse-glow 1.5s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 5px var(--accent); }
            50% { transform: scale(1.3); box-shadow: 0 0 20px var(--accent); }
            100% { transform: scale(1); box-shadow: 0 0 5px var(--accent); }
        }

        /* Formularz */
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #0c0d12; border: 1px solid #444; color: var(--gold); box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <h1>SIEĆ REBELII // HQ</h1>
        <button class="btn-add-main" onclick="toggleAddForm()">[+] DODAJ SEKTOR</button>
    </header>

    <div id="map"></div>
    <div id="sidebar"><div id="sidebarContent"></div></div>

<script>
window.onload = function() {
    const SUPABASE_URL = 'https://mzxtgapfqwhhnnldxwlx.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHRnYXBmcXdoaG5ubGR4d2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzA3MDEsImV4cCI6MjA5MDMwNjcwMX0.Mc1aD03KQULGkUjc-folTiv9DVUY6fFl0Ke9A2EHFxw';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const map = L.map('map', { zoomSnap: 0.1, attributionControl: false }).setView([52.06, 19.48], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const formatText = (str) => str ? str.trim().toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') : "";

    window.toggleAddForm = function() {
        document.getElementById('sidebar').style.display = 'block';
        document.getElementById('sidebarContent').innerHTML = `
            <h2 style="color:var(--accent)">REJESTRACJA CELU</h2>
            <div class="form-group"><label>NAZWA FIRMY</label><input type="text" id="add_name"></div>
            <div class="form-group"><label>ULICA I NUMER</label><input type="text" id="add_street"></div>
            <div class="form-group"><label>MIASTO</label><input type="text" id="add_city"></div>
            <div class="form-group"><label>ŁĄCZE WWW</label><input type="text" id="add_url"></div>
            <button class="btn-save" onclick="finalizujZapis()">ZAPISZ W BAZIE</button>
            <button class="btn-save" style="background:none; border:1px solid #444; color:#666" onclick="document.getElementById('sidebar').style.display='none'">ANULUJ</button>
        `;
    }

    window.finalizujZapis = async function() {
        const name = formatText(document.getElementById('add_name').value);
        const street = formatText(document.getElementById('add_street').value);
        const city = formatText(document.getElementById('add_city').value);
        const web = document.getElementById('add_url').value.trim();

        if(!name || !street || !city) return alert("Brak danych!");
        const fullAddr = `${street}, ${city}`;
        
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fullAddr)}`);
            const data = await res.json();
            if(data.length === 0) return alert("Błąd lokalizacji!");

            const { error } = await _supabase.from('shops').insert([{ name, city: fullAddr, lat: data[0].lat, lng: data[0].lon, description: web }]);
            if(!error) location.reload(); else alert(error.message);
        } catch(e) { alert("Błąd sieci."); }
    }

    async function loadShops() {
        const { data, error } = await _supabase.from('shops').select('*');
        if(error) return;

        data.forEach(shop => {
            const tacticalIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div class='rebel-marker'></div>",
                iconSize: [14, 14], iconAnchor: [7, 7]
            });

            L.marker([shop.lat, shop.lng], { icon: tacticalIcon }).addTo(map).on('click', () => {
                document.getElementById('sidebar').style.display = 'block';
                const link = shop.description ? (shop.description.startsWith('http') ? shop.description : 'https://' + shop.description) : null;
                
                document.getElementById('sidebarContent').innerHTML = `
                    <div class="shop-card">
                        <h2>${shop.name}</h2>
                        <div class="info-row"><label>LOKALIZACJA</label><p>${shop.city}</p></div>
                        <div class="info-row">
                            <label>ŁĄCZE WWW</label>
                            <p>${link ? `<a href="${link}" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:bold;">➔ OTWÓRZ PANEL</a>` : 'BRAK DANYCH'}</p>
                        </div>
                        <button class="btn-save" style="background:#222; border: 1px solid #444;" onclick="document.getElementById('sidebar').style.display='none'">ZAMKNIJ</button>
                    </div>
                `;
            });
        });
    }
    loadShops();
};
</script>
</body>
</html>
