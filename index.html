<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameFinder // Poland Sector</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- TACTICAL-CYBERPUNK THEME --- */
        :root { 
            --gold: #d8c3a5; 
            --dark-red: #1a0a0a; /* Bardzo ciemne, czerwonawe tło */
            --accent: #e94560; 
            --glass: rgba(26, 10, 10, 0.98); /* Tło panelu */
            --bright-gold: #ffcc00;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            background: var(--dark-red); 
            color: var(--gold); 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header { 
            background: #2a1010; 
            padding: 10px 15px; 
            border-bottom: 2px solid #8c6a30; 
            z-index: 2000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        header h1 { 
            margin: 0; 
            font-size: 1.2rem; 
            letter-spacing: 2px; 
            color: var(--gold);
            text-transform: uppercase;
        }

        .btn-add-main {
            background: transparent;
            color: var(--gold);
            border: 1px solid #8c6a30;
            padding: 8px 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .btn-add-main:hover { background: #3a1515; border-color: var(--gold); }

        /* --- MAPA --- */
        .main-content { flex: 1; position: relative; overflow: hidden; }
        #map { width: 100%; height: 100%; background: #000; }

        /* Tactical Zoom Control */
        .leaflet-touch .leaflet-bar a { 
            background-color: var(--dark-red); 
            color: var(--gold); 
            border: 1px solid #8c6a30;
            width: 35px; height: 35px; line-height: 35px;
        }
        .leaflet-touch .leaflet-bar a:hover { background-color: #3a1515; }

        /* --- SIDEBAR (Tactical & RWD) --- */
        #sidebar { 
            background: var(--glass); 
            border-left: 3px solid #8c6a30; 
            padding: 20px; 
            display: none; 
            position: absolute;
            z-index: 3000;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            transition: all 0.3s ease-out;
        }

        /* Desktop */
        @media (min-width: 768px) {
            #sidebar {
                width: 380px; 
                right: 0; top: 0; bottom: 0;
            }
        }

        /* Mobile (Wysuwany z dołu) */
        @media (max-width: 767px) {
            #sidebar {
                width: 100%; height: 85%;
                bottom: 0; left: 0; right: 0;
                border-left: none;
                border-top: 4px solid #8c6a30;
                border-radius: 20px 20px 0 0;
                padding: 15px;
            }
        }

        /* --- FORMULARZ (Stylizowany) --- */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 4px; color: #8c6a30; font-weight: bold; letter-spacing: 1px;}
        input { 
            width: 100%; padding: 12px; background: #0c0d12; border: 1px solid #444; 
            color: var(--gold); border-radius: 4px; box-sizing: border-box; font-size: 1rem;
        }
        input:focus { border-color: var(--bright-gold); outline: none; background: #1a0a0a; }
        input::placeholder { color: #555; }

        .btn-save { 
            background: transparent; color: var(--gold); border: 2px solid #8c6a30; padding: 15px; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 10px;
            font-size: 1rem; letter-spacing: 1px; transition: 0.2s;
        }
        .btn-save:hover { background: #3a1515; border-color: var(--gold); }

        #loading_msg { display: none; color: var(--accent); font-weight: bold; text-align: center; margin: 10px 0; font-size: 0.8rem; letter-spacing: 1px; }
        .req-star { color: var(--accent); }

        /* --- KARTA SKLEPU (Powrót Ikonek!) --- */
        .shop-card h2 { color: var(--bright-gold); margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 15px; font-size: 1.8rem; letter-spacing: 1px; }
        .info-row { display: flex; align-items: flex-start; margin-bottom: 15px; gap: 10px; }
        .info-icon { width: 22px; height: 22px; margin-top: 2px; flex-shrink: 0; }
        .info-text { flex: 1; margin: 0; font-size: 1.1rem; line-height: 1.4; color: #fff; }
        
        .www-link { color: var(--accent); font-weight: bold; text-decoration: none; border-bottom: 1px solid transparent; }
        .www-link:hover { border-bottom-color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>GAMEFINDER // POLAND SECTOR</h1>
        <button class="btn-add-main" onclick="toggleAddForm()">[+] Dodaj Nowy Sektor</button>
    </header>

    <div class="main-content">
        <div id="map"></div>
        <div id="sidebar">
            <div id="sidebarContent"></div>
        </div>
    </div>

<script>
window.onload = function() {
    const SUPABASE_URL = 'https://mzxtgapfqwhhnnldxwlx.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHRnYXBmcXdoaG5ubGR4d2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzA3MDEsImV4cCI6MjA5MDMwNjcwMX0.Mc1aD03KQULGkUjc-folTiv9DVUY6fFl0Ke9A2EHFxw';

    const { createClient } = window.supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const map = L.map('map', { 
        zoomSnap: 0.1, 
        attributionControl: false,
        zoomControl: false 
    }).setView([52.06, 19.48], 6);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Maska Polski
    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
    .then(res => res.json()).then(data => {
        const poland = data.features.find(f => f.properties.name === "Poland");
        if (poland) {
            L.geoJSON(poland, { 
                style: { color: "#8c6a30", weight: 1.5, fillOpacity: 0.03, fillColor: "#8c6a30" }, 
                interactive: false 
            }).addTo(map);
        }
    });

    // Pomocnik dużych liter
    const formatText = (str) => {
        if (!str) return "";
        return str.trim().toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    };

    function openSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.style.display = 'block';
        if(window.innerWidth < 768) { sidebar.scrollTop = 0; }
    }

    // --- FORMULARZ ---
    window.toggleAddForm = function() {
        const content = document.getElementById('sidebarContent');
        openSidebar();
        
        content.innerHTML = `
            <h2 style="color:var(--accent); text-transform:uppercase; letter-spacing:1px;">Rejestracja Sektora</h2>
            <div class="form-group">
                <label>Nazwa <span class="req-star">*</span></label>
                <input type="text" id="add_name" placeholder="np. Retro World">
            </div>
            <div class="form-group">
                <label>Ulica i numer <span class="req-star">*</span></label>
                <input type="text" id="add_street" placeholder="np. Krzywoustego 49">
            </div>
            <div class="form-group">
                <label>Miasto <span class="req-star">*</span></label>
                <input type="text" id="add_city" placeholder="np. Szczecin">
            </div>
            <div class="form-group">
                <label>Strona WWW / FB (opcjonalnie)</label>
                <input type="text" id="add_url" placeholder="www.przyklad.pl">
            </div>

            <div id="loading_msg">NAMIERZANIE WSPÓŁRZĘDNYCH...</div>

            <button class="btn-save" id="btn_submit" onclick="finalizujZapisAutomatyczny()">Zapisz w Bazie</button>
            <button class="btn-save" style="background:none; border-color:#444; color:#666; margin-top:8px;" onclick="document.getElementById('sidebar').style.display='none'">Anuluj</button>
            <div style="height: 30px;"></div>
        `;
    }

    // --- ZAPIS ---
    window.finalizujZapisAutomatyczny = async function() {
        const rawName = document.getElementById('add_name').value;
        const rawStreet = document.getElementById('add_street').value;
        const rawCity = document.getElementById('add_city').value;
        const web = document.getElementById('add_url').value.trim().toLowerCase();
        
        const name = formatText(rawName);
        const street = formatText(rawStreet);
        const city = formatText(rawCity);

        const loader = document.getElementById('loading_msg');
        const btn = document.getElementById('btn_submit');

        if(!name || !street || !city) {
            alert("Uzupełnij nazwę, ulicę i miasto!");
            return;
        }

        const fullAddress = `${street}, ${city}`;
        loader.style.display = "block";
        btn.disabled = true;
        btn.style.opacity = "0.5";

        try {
            const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fullAddress)}`;
            const response = await fetch(geoUrl);
            const geoData = await response.json();

            if (geoData.length === 0) {
                alert("Nie znaleźliśmy adresu. Sprawdź pisownię!");
                return;
            }

            const { error } = await _supabase.from('shops').insert([
                { name: name, city: fullAddress, lat: geoData[0].lat, lng: geoData[0].lon, description: web }
            ]);

            if (!error) {
                alert("Sektor " + name + " dodany pomyślnie!");
                location.reload();
            } else {
                alert("Błąd bazy: " + error.message);
            }
        } catch (err) {
            alert("Problem z serwerem map.");
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
            btn.style.opacity = "1";
        }
    }

    // --- WCZYTYWANIE I IKONA PADA ---
    async function loadShops() {
        const { data: shops, error } = await _supabase.from('shops').select('*');
        if (error) return;

        shops.forEach(shop => {
            // POWRÓT PADA: Twoja ikona pad.png
            const tacticalPadIcon = L.icon({
                iconUrl: 'pad.png',
                iconSize: [36, 36], // Troszkę większe na mobile
                iconAnchor: [18, 18], // Środek ikony
                className: 'glow-marker' // Klasa do pulsowania
            });

            const marker = L.marker([shop.lat, shop.lng], {
                icon: tacticalPadIcon
            }).addTo(map);

            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                showShopInfo(shop);
            });
        });
    }

    // --- PODGLĄD SKLEPU (Powrót Ikon!) ---
    window.showShopInfo = function(shop) {
        const content = document.getElementById('sidebarContent');
        openSidebar();
        
        let displayLink = shop.description || "";
        let fullLink = displayLink;
        if (fullLink && !fullLink.startsWith('http')) fullLink = 'https://' + fullLink;

        content.innerHTML = `
            <div class="shop-card">
                <h2>${shop.name}</h2>
                
                <div class="info-row">
                    <img src="location.png" class="info-icon">
                    <div class="info-text">
                        <label>ADRES:</label>
                        <p>${shop.city}</p>
                    </div>
                </div>
                
                <div class="info-row">
                    <img src="web.png" class="info-icon">
                    <div class="info-text">
                        <label>STRONA WWW / KONTAKT:</label>
                        ${displayLink ? `
                            <p><a href="${fullLink}" target="_blank" class="www-link">${displayLink}</a></p>
                        ` : '<p style="color: #666;">Brak danych</p>'}
                    </div>
                </div>
                
                <hr style="border:0; border-top:1px solid #333; margin: 30px 0;">
                <button class="btn-save" style="background:#222; border-color:#444;" onclick="document.getElementById('sidebar').style.display='none'">Powrót do Taktycznej Mapy</button>
                <div style="height: 30px;"></div>
            </div>
        `;
    }

    map.on('click', () => {
        if(window.innerWidth < 768) { document.getElementById('sidebar').style.display = 'none'; }
    });

    loadShops();
};
</script>

<style>
/* --- Styl dla pulsowania ikon ( tactical glow) --- */
.glow-marker {
    filter: drop-shadow(0 0 5px rgba(233, 69, 96, 0.7));
    animation: glow-pulse 2s infinite ease-in-out;
}

@keyframes glow-pulse {
    0% { filter: drop-shadow(0 0 5px rgba(233, 69, 96, 0.7)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 10px rgba(233, 69, 96, 0.9)); transform: scale(1.05); }
    100% { filter: drop-shadow(0 0 5px rgba(233, 69, 96, 0.7)); transform: scale(1); }
}
</style>

</body>
</html>
