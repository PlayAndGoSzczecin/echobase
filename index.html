<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GameFinder // Poland Sector</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { 
            --gold: #d8c3a5; 
            --dark-red: #1a0a0a; 
            --accent: #e94560; 
            --glass: rgba(26, 10, 10, 0.98);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--dark-red); 
            color: var(--gold); 
            overflow: hidden; 
            height: 100vh;
        }

        header { 
            background: #2a1010; 
            padding: 10px 15px; 
            border-bottom: 2px solid #8c6a30; 
            z-index: 2000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }

        .btn-add-main {
            background: transparent;
            color: var(--gold);
            border: 1px solid #8c6a30;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.75rem;
        }

        #map { width: 100%; height: calc(100vh - 60px); background: #000; }

        /* SIDEBAR RWD */
        #sidebar { 
            background: var(--glass); 
            border-left: 3px solid #8c6a30; 
            padding: 20px; 
            display: none; 
            position: absolute;
            z-index: 3000;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }

        @media (min-width: 768px) { #sidebar { width: 380px; right: 0; top: 0; bottom: 0; } }
        @media (max-width: 767px) { #sidebar { width: 100%; height: 85%; bottom: 0; left: 0; border-top: 4px solid #8c6a30; border-radius: 20px 20px 0 0; } }

        /* FORM */
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.7rem; color: #8c6a30; font-weight: bold; margin-bottom: 4px; }
        input { width: 100%; padding: 12px; background: #0c0d12; border: 1px solid #444; color: var(--gold); box-sizing: border-box; }

        .btn-save { 
            background: transparent; color: var(--gold); border: 2px solid #8c6a30; padding: 15px; 
            width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 10px;
        }

        /* CARD */
        .shop-card h2 { color: #ffcc00; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .info-row { display: flex; align-items: flex-start; margin-bottom: 15px; gap: 10px; }
        .info-icon { width: 20px; height: 20px; flex-shrink: 0; }
        .info-text p { margin: 0; color: #fff; }
        
        .glow-marker { filter: drop-shadow(0 0 5px var(--accent)); }
    </style>
</head>
<body>

    <header>
        <h1>SIEĆ REBELII // HQ</h1>
        <button class="btn-add-main" onclick="toggleAddForm()">[+] DODAJ SEKTOR</button>
    </header>

    <div id="map"></div>
    <div id="sidebar"><div id="sidebarContent"></div></div>

<script>
window.onload = function() {
    const SUPABASE_URL = 'https://mzxtgapfqwhhnnldxwlx.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16eHRnYXBmcXdoaG5ubGR4d2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzA3MDEsImV4cCI6MjA5MDMwNjcwMX0.Mc1aD03KQULGkUjc-folTiv9DVUY6fFl0Ke9A2EHFxw';

    const { createClient } = window.supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const map = L.map('map', { zoomSnap: 0.1, attributionControl: false, zoomControl: false }).setView([52.06, 19.48], 6);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const formatText = (str) => str ? str.trim().toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') : "";

    window.toggleAddForm = function() {
        document.getElementById('sidebar').style.display = 'block';
        document.getElementById('sidebarContent').innerHTML = `
            <h2 style="color:var(--accent)">REJESTRACJA</h2>
            <div class="form-group"><label>NAZWA FIRMY</label><input type="text" id="add_name"></div>
            <div class="form-group"><label>ULICA I NUMER</label><input type="text" id="add_street"></div>
            <div class="form-group"><label>MIASTO</label><input type="text" id="add_city"></div>
            <div class="form-group"><label>STRONA WWW</label><input type="text" id="add_url"></div>
            <button class="btn-save" onclick="finalizujZapisAutomatyczny()">ZAPISZ</button>
            <button class="btn-save" style="border-color:#444; color:#666" onclick="document.getElementById('sidebar').style.display='none'">ANULUJ</button>
        `;
    }

    window.finalizujZapisAutomatyczny = async function() {
        const name = formatText(document.getElementById('add_name').value);
        const street = formatText(document.getElementById('add_street').value);
        const city = formatText(document.getElementById('add_city').value);
        const web = document.getElementById('add_url').value.trim();

        if(!name || !street || !city) return alert("Błąd: Brak danych!");

        try {
            const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(street + ', ' + city)}`;
            const geoRes = await fetch(geoUrl);
            const geoData = await geoRes.json();
            if(geoData.length === 0) return alert("Nie znaleziono adresu!");

            const { error } = await _supabase.from('shops').insert([{ name, city: street + ', ' + city, lat: geoData[0].lat, lng: geoData[0].lon, description: web }]);
            if(!error) location.reload(); else alert(error.message);
        } catch (e) { alert("Błąd połączenia"); }
    }

    async function loadShops() {
        const { data, error } = await _supabase.from('shops').select('*');
        if(error) return;
        data.forEach(shop => {
            const icon = L.icon({ iconUrl: 'pad.png', iconSize: [32, 32], iconAnchor: [16, 16], className: 'glow-marker' });
            L.marker([shop.lat, shop.lng], { icon }).addTo(map).on('click', () => {
                document.getElementById('sidebar').style.display = 'block';
                const link = shop.description ? (shop.description.startsWith('http') ? shop.description : 'https://' + shop.description) : null;
                document.getElementById('sidebarContent').innerHTML = `
                    <div class="shop-card">
                        <h2>${shop.name}</h2>
                        <div class="info-row"><img src="location.png" class="info-icon"><div class="info-text"><label>ADRES</label><p>${shop.city}</p></div></div>
                        <div class="info-row"><img src="web.png" class="info-icon"><div class="info-text"><label>WWW</label>
                        <p>${link ? `<a href="${link}" target="_blank" style="color:var(--accent);font-weight:bold;text-decoration:none">ODWIEDŹ STRONĘ</a><br><span style="font-size:0.7rem;color:#8c6a30">${shop.description}</span>` : 'Brak'}</div></div>
                        <button class="btn-save" style="background:#222" onclick="document.getElementById('sidebar').style.display='none'">ZAMKNIJ</button>
                    </div>
                `;
            });
        });
    }
    loadShops();
};
</script>
</body>
</html>
